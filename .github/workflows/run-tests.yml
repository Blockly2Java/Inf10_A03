name: Run Exercise Tests

on:
  push:

permissions:
  contents: read

jobs:
  test:
    name: Test ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: solution
            pom_file: pom_solution.xml
          - target: template
            pom_file: pom_template.xml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests for ${{ matrix.target }}
        run: mvn -B -f tests/${{ matrix.pom_file }} clean test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.target }}
          path: tests/target/surefire-reports
          if-no-files-found: ignore
